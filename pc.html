<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>papoxv | Windows & Office</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: radial-gradient(circle, #2a0000 0%, #050000 100%); color: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; min-height: 100vh; padding: 120px 20px 40px 20px; overflow-x: hidden; perspective: 1000px; }
        .navbar { position: fixed; top: 0; left: 0; width: 100%; background: rgba(5, 0, 0, 0.95); border-bottom: 2px solid rgba(255, 0, 0, 0.3); display: flex; justify-content: center; gap: 25px; padding: 18px; z-index: 1000; }
        .nav-link { color: #b3b3b3; text-decoration: none; font-size: 1rem; font-weight: bold; text-transform: uppercase; }
        .nav-link.active { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
        .search-container { max-width: 500px; margin: 20px auto 30px auto; display: flex; justify-content: center; width: 100%; }
        .search-input { width: 100%; padding: 14px 20px; background: rgba(0, 0, 0, 0.6); border: 2px solid #ff0000; border-radius: 30px; color: #ffffff; font-size: 1rem; outline: none; box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); transition: all 0.3s ease; text-align: center; }
        .search-input::placeholder { color: #888888; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        .search-input:focus { box-shadow: 0 0 25px #ff0000; background: rgba(15, 5, 5, 0.8); }
        .grid-container { display: flex; flex-wrap: wrap; gap: 30px; max-width: 1200px; margin: 40px auto 0 auto; justify-content: center; }
        .card { background: rgba(15, 5, 5, 0.5); border: 2px solid #ff0000; border-radius: 20px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); padding: 30px 25px; display: flex; flex-direction: column; align-items: center; text-align: center; min-height: 420px; width: 100%; max-width: 340px; justify-content: space-between; transition: transform 0.1s ease, box-shadow 0.3s ease, border-color 0.3s ease; cursor: pointer; transform-style: preserve-3d; }
        .card-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 2px; transform: translateZ(20px); }
        .card-subtitle { font-size: 0.8rem; color: #ff0000; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; transform: translateZ(15px); }
        .card-img { width: 100%; max-width: 140px; height: 80px; object-fit: contain; margin: 15px 0; transform: translateZ(25px); }
        .btn-group { width: 100%; display: flex; flex-direction: column; gap: 12px; transform-style: preserve-3d; transform: translateZ(15px); }
        .btn-action { display: block; width: 100%; padding: 12px; color: #ffffff; text-decoration: none; font-weight: bold; font-size: 0.9rem; border-radius: 15px; text-transform: uppercase; text-align: center; letter-spacing: 1px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease; }
        .btn-tutorial { background: #00a2ff; box-shadow: 0 4px 10px rgba(0, 162, 255, 0.3); }
        .btn-download { background: #a200ff; box-shadow: 0 4px 10px rgba(162, 0, 255, 0.3); }
        .btn-tutorial:hover { transform: translateZ(25px) scale(1.04); box-shadow: 0 10px 20px rgba(0, 162, 255, 0.6); }
        .btn-download:hover { transform: translateZ(25px) scale(1.04); box-shadow: 0 10px 20px rgba(162, 0, 255, 0.6); }
        #notification-container { position: fixed; bottom: 30px; left: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast-notification { background: rgba(0, 0, 0, 0.8); border: 2px solid #ff0000; border-radius: 12px; padding: 16px 28px; color: #ffffff; font-weight: bold; font-size: 0.95rem; box-shadow: 0 0 25px rgba(255, 0, 0, 0.7); display: flex; align-items: center; opacity: 0; transform: translateY(20px); transition: opacity 0.3s ease, transform 0.3s ease; }
        .toast-notification.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="juegos.html" class="nav-link">Juegos</a>
        <a href="aplicaciones.html" class="nav-link">Aplicaciones</a>
        <a href="pc.html" class="nav-link active">Windows & Office</a>
    </div>
    <div id="notification-container"></div>
    <div class="search-container">
        <input type="text" class="search-input" placeholder="🔍 Buscar herramientas...">
    </div>
    <div class="grid-container">
        <div class="card">
            <div>
                <div class="card-title">Windows 10 Pro</div>
                <div class="card-subtitle">(ISO Oficial Pre-activada)</div>
            </div>
            <img class="card-img" src="windows10.png" alt="Windows 10">
            <div class="btn-group">
                <a href="#" class="btn-action btn-tutorial">Ver Tutorial</a>
                <a href="#" class="btn-action btn-download btn-notify" data-name="Windows 10 Pro">Descargar</a>
            </div>
        </div>
    </div>
    <div style="display: flex; justify-content: center; margin: 60px 0 20px 0; width: 100%;">
        <a href="index.html" style="display: inline-flex; align-items: center; padding: 15px 35px; background: #000000; border: 2px solid #ff0000; border-radius: 15px; color: #ffffff; font-weight: bold; text-decoration: none; text-transform: uppercase; font-size: 1rem; letter-spacing: 1px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); transition: all 0.3s ease;" onmouseover="this.style.transform='scale(1.05)'; this.style.boxShadow='0 0 30px #ff0000';" onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 0 20px rgba(255, 0, 0, 0.6)';">
            Volver al inicio
        </a>
    </div>
    <script type="text/javascript">
        window.addEventListener('DOMContentLoaded', () => {
            const input = document.querySelector('.search-input');
            if (input) {
                input.addEventListener('input', function(e) {
                    const texto = e.target.value.toLowerCase().trim();
                    document.querySelectorAll('.grid-container .card').forEach(card => {
                        const titulo = card.querySelector('.card-title').textContent.toLowerCase();
                        card.style.display = titulo.includes(texto) ? 'flex' : 'none';
                    });
                });
            }
            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('mousemove', function(e) {
                    const box = this.getBoundingClientRect();
                    const x = e.clientX - box.left - (box.width / 2);
                    const y = e.clientY - box.top - (box.height / 2);
                    const rotarX = -(y / box.height) * 20;
                    const rotarY = (x / box.width) * 20;
                    this.style.transform = `rotateX(${rotarX}deg) rotateY(${rotarY}deg) scale(1.03)`;
                    this.style.boxShadow = "0 15px 35px rgba(255, 0, 0, 0.6)";
                    this.style.borderColor = "#ff4d4d";
                });
                card.addEventListener('mouseleave', function() {
                    this.style.transform = "rotateX(0deg) rotateY(0deg) scale(1)";
                    this.style.boxShadow = "0 0 20px rgba(255, 0, 0, 0.4)";
                    this.style.borderColor = "#ff0000";
                });
            });
            document.querySelectorAll('.btn-notify').forEach(btn => {
                btn.addEventListener('click', function() {
                    const appName = this.getAttribute('data-name');
                    const container = document.getElementById('notification-container');
                    if (container) {
                        const toast = document.createElement('div');
                        toast.className = 'toast-notification';
                        toast.innerHTML = '🚀 Preparando descarga de ' + appName + '...';
                        container.appendChild(toast);
                        setTimeout(() => toast.classList.add('show'), 50);
                        setTimeout(() => {
                            toast.classList.remove('show');
                            setTimeout(() => toast.remove(), 300);
                        }, 3000);
                    }
                });
            });
        });
    </script>
</body>
</html>
