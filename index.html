<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>papoxv | Plataforma de Descargas Premium</title>
    <!-- Paquete oficial corregido para activar los iconos gamer -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: radial-gradient(circle, #2a0000 0%, #050000 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .home-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
            max-width: 650px;
        }
        .home-logo {
            font-size: 4.5rem;
            font-weight: 900;
            color: #ff0000;
            text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }
        .big-btn {
            display: flex;
            width: 100%;
            background: rgba(15, 5, 5, 0.7);
            border: 2px solid #ff0000;
            border-radius: 16px;
            padding: 35px;
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .big-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px #ff0000;
        }
        .big-btn i { color: #ff4d4d; font-size: 1.8rem; }
        .footer {
            margin-top: 50px;
            font-size: 0.9rem;
            color: #777777;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="home-menu">
        <div class="home-logo">PAPOXV</div>
        
        <!-- Enlaces corregidos nativamente con tu usuario real: papoxv-oficial -->
        <a href="https://github.io" class="big-btn"><i class="fas fa-gamepad"></i> Juegos</a>
        <a href="https://github.io" class="big-btn"><i class="fas fa-mobile-alt"></i> Aplicaciones</a>
        <a href="https://github.io" class="big-btn"><i class="fas fa-desktop"></i> Windows & Office</a>
    </div>

    <div class="footer">
        <p>&copy; 2026 papoxv | Todos los derechos reservados.</p>
    </div>

</body>
</html>
