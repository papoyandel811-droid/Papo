<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAPOXV | Inicio</title>
    <style>
        /* Reseteo básico */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        /* Fondo degradado original con animación de partículas activada */
        body { 
            background: radial-gradient(circle, #2a0000 0%, #050000 100%); 
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            position: relative;
            overflow-x: hidden;
        }

        /* Capa transparente para las partículas flotantes rojas */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle, rgba(255, 0, 0, 0.4) 1px, transparent 1px),
                radial-gradient(circle, rgba(255, 0, 0, 0.3) 2px, transparent 2px);
            background-size: 100px 100px, 150px 150px;
            background-position: 0 0, 50px 50px;
            animation: flotarParticulas 20s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes flotarParticulas {
            from { background-position: 0 0, 50px 50px; }
            to { background-position: 0 -300px, 50px -350px; }
        }
        
        /* Título PAPOXV con efecto neón rojo original */
        .logo { 
            font-size: 4rem; 
            font-weight: 900; 
            color: #ff0000; 
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000; 
            margin-bottom: 40px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            z-index: 2;
        }
        
        /* Contenedor de los botones */
        .menu-container { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            width: 100%; 
            max-width: 600px; 
            z-index: 2;
        }
        
        /* BOTONES ORIGINALES TRANSLÚCIDOS */
        .menu-btn { 
            display: block; 
            width: 100%; 
            padding: 25px; 
            background: rgba(15, 5, 5, 0.4); 
            border: 2px solid #ff0000; 
            border-radius: 16px; 
            color: #ffffff; 
            font-size: 1.5rem; 
            font-weight: bold; 
            text-decoration: none; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            transition: all 0.3s ease; 
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); 
        }
        
        .menu-btn:hover { 
            transform: scale(1.02); 
            box-shadow: 0 0 25px #ff0000; 
            background: rgba(42, 0, 0, 0.6); 
        }
        
        /* Pie de página original */
        footer { 
            margin-top: 50px; 
            font-size: 0.85rem; 
            color: #555555; 
            text-align: center; 
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="logo">𝖕𝖆𝖕𝖔𝖗𝖟</div>

    <div class="menu-container">
        <a href="juegos.html" class="menu-btn">𝖏𝖚𝖊𝖌𝖔𝖘 🎮</a>
        <a href="aplicaciones.html" class="menu-btn">Aplicaciones ⚙️</a>
        <a href="pc.html" class="menu-btn">Windows & Office 💿</a>
    </div>

    <footer>
        © 2026 papoxv | Todos los derechos reservados.
    </footer>
