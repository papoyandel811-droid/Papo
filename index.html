    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: radial-gradient(circle, #2a0000 0%, #050000 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding-top: 90px;
            padding-bottom: 100px; /* Espacio extra para que el botón flotante no tape nada */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* BARRA DE NAVEGACIÓN SUPERIOR FIJA */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(5, 0, 0, 0.95);
            border-bottom: 2px solid rgba(255, 0, 0, 0.3);
            display: none;
            justify-content: center;
            gap: 25px;
            padding: 18px;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(255, 0, 0, 0.2);
        }

        .nav-link {
            color: #b3b3b3;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s, text-shadow 0.3s;
            cursor: pointer;
        }

        .nav-link:hover, .nav-link.active {
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 0 20px;

        /* SECCIONES INTERNAS */
        .main-section {
            display: none;
            width: 100%;

        .home-menu {

            justify-content: center;

            width: 100%;
            max-width: 650px;
            margin: 40px auto 0 auto;
        }

        .home-logo {
            font-size: 4.5rem;
            font-weight: 900;
            color: #ff0000;
            text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        /* BOTONES GIGANTES EN EL INICIO */
        .big-btn {
            width: 100%;
            background: rgba(15, 5, 5, 0.7);
            border: 2px solid #ff0000;
            border-radius: 16px;
            padding: 35px;
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2), inset 0 0 15px rgba(255, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .big-btn i {
            color: #ff4d4d;
            font-size: 1.8rem;
        }

        .big-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px #ff0000;
        }

        /* DISEÑO DE LAS SECCIONES DE ARCHIVOS INTERNAS */
        .section-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .section-header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            text-transform: uppercase;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: rgba(15, 5, 5, 0.7);
            border: 2px solid #ff0000;
            border-radius: 16px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            justify-content: space-between;
            min-height: 380px;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .card-subtitle {
            font-size: 0.85rem;
            color: #ff4d4d;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .card-img {
            width: 90px;
            height: 90px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        .btn-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-action {
            display: block;
            width: 100%;
            padding: 12px;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
            border-radius: 30px;
            text-transform: uppercase;
            text-align: center;
        }

        .btn-tutorial { background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%); }
        .btn-download { background: linear-gradient(90deg, #9d4edd 0%, #7b2cbf 100%); }

        /* 📸 DISEÑO DEL BOTÓN FLOTANTE DE INSTAGRAM */
        .instagram-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            border-radius: 50px;
            text-decoration: none;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.3s, box-shadow 0.3s;
            z-index: 999;
        }

        .instagram-float:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(220, 39, 67, 0.5);
        }

        /* 📝 CORRECCIÓN DEL PIE DE PÁGINA */
        .footer {
            margin-top: auto;
            padding-top: 60px;
            font-size: 0.9rem;
            color: #777777;
            text-align: center;
            letter-spacing: 0.5px;
        }
    </style>
</head>
