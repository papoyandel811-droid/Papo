<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>papoxv | Aplicaciones Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: radial-gradient(circle, #2a0000 0%, #050000 100%); 
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            min-height: 100vh; 
            padding: 120px 20px 40px 20px; 
            overflow-x: hidden;
            perspective: 1000px;
        }
        
        .navbar { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(5, 0, 0, 0.95); 
            border-bottom: 2px solid rgba(255, 0, 0, 0.3); 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            padding: 18px; 
            z-index: 1000; 
        }
        
        .nav-link { 
            color: #b3b3b3; 
            text-decoration: none; 
            font-size: 1rem; 
            font-weight: bold; 
            text-transform: uppercase; 
        }
        
        .nav-link.active { 
            color: #ff0000; 
            text-shadow: 0 0 10px #ff0000; 
        }

        /* Buscador */
        .search-container { max-width: 500px; margin: 20px auto 30px auto; display: flex; justify-content: center; width: 100%; }
        .search-input { width: 100%; padding: 14px 20px; background: #000000; border: 2px solid #ff0000; border-radius: 30px; color: #ffffff; font-size: 1rem; outline: none; box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); transition: all 0.3s ease; text-align: center; }
        .search-input::placeholder { color: #888888; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        .search-input:focus { box-shadow: 0 0 25px #ff0000; background: rgba(15, 5, 5, 0.8); }
        
        .grid-container { display: flex; flex-wrap: wrap; gap: 30px; max-width: 1200px; margin: 0 auto; justify-content: center; }
        
        /* TARJETAS CON EFECTO INTERACTIVO MEJORADO */
        .card { 
            background: #000000; 
            border: 2px solid #ff0000; 
            border-radius: 20px; 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); 
            padding: 30px 25px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            min-height: 420px; 
            width: 100%; 
            max-width: 340px; 
            justify-content: space-between;
            transition: transform 0.1s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            cursor: pointer;
            transform-style: preserve-3d;
        }
        
        .card-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 2px; }
        .card-subtitle { font-size: 0.8rem; color: #ff0000; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; }
        .card-img { width: 100%; max-width: 140px; height: 80px; object-fit: contain; margin: 15px 0; }
        .btn-group { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        
        .btn-action { display: block; width: 100%; padding: 12px; color: #ffffff; text-decoration: none; font-weight: bold; font-size: 0.9rem; border-radius: 15px; text-transform: uppercase; text-align: center; letter-spacing: 1px; }
        .btn-tutorial { background: #00a2ff; box-shadow: 0 4px 10px rgba(0, 162, 255, 0.3); }
        .btn-download { background: #a200ff; box-shadow: 0 4px 10px rgba(162, 0, 255, 0.3); }
        .btn-action:hover { filter: brightness(1.2); }

        /* CONTENEDOR DE NOTIFICACIONES */
        #notification-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        /* ALERTA PREMIUM ESTILO PAPOXV */
        .toast-notification {
            background: #000000;
            border: 2px solid #ff0000;
            border-radius: 12px;
            padding: 16px 28px;
            color: #ffffff;
            font-weight: bold;
            font-size: 0.95rem;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.7);
            display: flex;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .toast-notification.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="juegos.html" class="nav-link">Juegos</a>
        <a href="aplicaciones.html" class="nav-link active">Aplicaciones</a>
        <a href="pc.html" class="nav-link">Windows & Office</a>
    </div>

    <!-- Contenedor de notificaciones -->
    <div id="notification-container"></div>

    <div class="search-container">
        <input type="text" class="search-input" placeholder="🔍 Buscar aplicación...">
    </div>

    <div class="grid-container">
        <!-- TARJETA 1: LOQUENDO VOICE -->
        <div class="card" onmousemove="ejecutarTilt(event, this)" onmouseleave="restaurarTilt(this)">
            <div>
                <div class="card-title">Loquendo Voice</div>
                <div class="card-subtitle">(Portable PC)</div>
            </div>
            <img class="card-img" src="https://nocookie.net" alt="Loquendo">
            <div class="btn-group">
                <a href="#" class="btn-action btn-tutorial">Ver Tutorial</a>
                <a href="https://cuty.io" target="_blank" class="btn-action btn-download" onclick="mostrarNotificacion('Loquendo Voice')">Descargar</a>
            </div>
        </div>

        <!-- TARJETA 2: CAPCUT PRO -->
        <div class="card" onmousemove="ejecutarTilt(event, this)" onmouseleave="restaurarTilt(this)">
            <div>
                <div class="card-title">CapCut Pro</div>
                <div class="card-subtitle">(Full Desbloqueado)</div>
            </div>
            <img class="card-img" src="capcut.png" alt="CapCut">
            <div class="btn-group">
                <a href="#" class="btn-action btn-tutorial">Ver Tutorial</a>
                <a href="#" class="btn-action btn-download" onclick="mostrarNotificacion('CapCut Pro')">Descargar</a>
            </div>
        </div>

        <!-- TARJETA 3: TIKTOK -->
        <div class="card" onmousemove="ejecutarTilt(event, this)" onmouseleave="restaurarTilt(this)">
            <div>
                <div class="card-title">TikTok</div>
                <div class="card-subtitle">(Full Desbloqueado)</div>
            </div>
            <img class="card-img" src="tiktok.png" alt="TikTok">
            <div class="btn-group">
                <a href="#" class="btn-action btn-tutorial">Ver Tutorial</a>
                <a href="#" class="btn-action btn-download" onclick="mostrarNotificacion('TikTok')">Descargar</a>
            </div>
        </div>
    </div>

    <div style="display: flex; justify-content: center; margin: 60px 0 20px 0; width: 100%;">
        <a href="index.html" style="display: inline-flex; align-items: center; padding: 15px 35px; background: #000000; border: 2px solid #ff0000; border-radius: 15px; color: #ffffff; font-weight: bold; text-decoration: none; text-transform: uppercase; font-size: 1rem; letter-spacing: 1px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); transition: all 0.3s ease;" onmouseover="this.style.transform='scale(1.05)'; this.style.boxShadow='0 0 30px #ff0000';" onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 0 20px rgba(255, 0, 0, 0.6)';">
            Volver al inicio
        </a>
    </div>

    <script>
        // Sistema de Búsqueda Automático en Tiempo Real Arreglado
        document.querySelector('.search-input').addEventListener('input', function(e) {
            let texto = e.target.value.toLowerCase().trim();
            document.querySelectorAll('.card').forEach(function(card) {
                let titulo = card.querySelector('.card-title').textContent.toLowerCase();
                if (titulo.includes(texto)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        });

        // Efecto Tilt 3D Nativo e Interactivo
        function ejecutarTilt(e, card) {
            const box = card.getBoundingClientRect();
            const x = e.clientX - box.left - (box.width / 2);
            const y = e.clientY - box.top - (box.height / 2);
            
            const rotarX = -(y / box.height) * 25;
            const rotarY = (x / box.width) * 25;
            
            card.style.transform = `rotateX(${rotarX}deg) rotateY(${rotarY}deg) scale(1.04)`;
            card.style.boxShadow = "0 15px 35px rgba(255, 0, 0, 0.6)";
            card.style.borderColor = "#ff4d4d";
        }

        function restaurarTilt(card) {
            card.style.transform = "rotateX(0deg) rotateY(0deg) scale(1)";
            card.style.boxShadow = "0 0 20px rgba(255, 0, 0, 0.4)";
            card.style.borderColor = "#ff0000";
        }

        // Sistema de Alertas Directas al Descargar
        function mostrarNotificacion(nombreApp) {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.innerHTML = `🚀 Preparando descarga de ${nombreApp}...`;
            
            container.appendChild(toast);
