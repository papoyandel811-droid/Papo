<!DOCTYPE html>
<html lang="es" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>papoxv | Aplicaciones</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* AURORA LÍQUIDA (Fondo dinámico) */
        body { 
            background: radial-gradient(circle, #2a0000 0%, #050000 100%); 
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            min-height: 100vh; 
            padding: 120px 0 40px 0; 
            overflow-x: hidden;
            overflow-y: auto;
            transition: background 0.8s ease;
        }
        
        /* NAVBAR SUPERIOR */
        .navbar { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(5, 0, 0, 0.95); 
            border-bottom: 2px solid rgba(255, 0, 0, 0.3); 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            padding: 18px; 
            z-index: 1000; 
        }
        .nav-link { color: #b3b3b3; text-decoration: none; font-size: 1rem; font-weight: bold; text-transform: uppercase; }
        .nav-link.active { color: #ff0000; text-shadow: 0 0 10px #ff0000; }

        /* BARRA DE PROGRESO DE LECTURA */
        .progress-bar-scroll {
            position: fixed;
            top: 56px; left: 0; height: 3px; background: #ff0000;
            box-shadow: 0 0 10px #ff0000; width: 0%; z-index: 1010; transition: width 0.1s ease;
        }

        /* TÍTULO CON CYBER GLITCH */
        .section-title {
            text-align: center; font-size: 2.2rem; font-weight: 900; color: #ffffff;
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
        }
        .section-title.glitch { animation: glitchEffect 0.2s linear infinite; }
        @keyframes glitchEffect {
            0% { text-shadow: 2px -2px #ff0000, -2px 2px #00c6ff; transform: translate(2px, -1px); }
            50% { text-shadow: -2px 2px #ff0000, -2px 2px #00c6ff; transform: translate(-1px, 2px); }
            100% { text-shadow: 2px 2px #ff0000, -2px -2px #00c6ff; transform: translate(0, 0); }
        }

        /* TACÓMETRO DE BÚSQUEDA */
        .search-wrapper { position: relative; max-width: 500px; margin: 10px auto 30px auto; width: 100%; padding: 0 20px; }
        .search-input { width: 100%; padding: 14px 20px; background: rgba(0, 0, 0, 0.7); border: 2px solid #ff0000; border-radius: 30px; color: #ffffff; font-size: 1rem; outline: none; box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); transition: all 0.3s ease; text-align: center; position: relative; z-index: 5; }
        .search-input:focus { box-shadow: 0 0 25px #ff0000; }
        .tacometro-arc { position: absolute; top: -5px; bottom: -5px; left: 15px; right: 15px; border: 3px solid transparent; border-top: 3px solid rgba(255,0,0,0.1); border-radius: 35px; pointer-events: none; transition: all 0.3s ease; z-index: 1; }
        .tacometro-arc.active { border-top-color: #ff0000; box-shadow: 0 -5px 15px rgba(255,0,0,0.5); transform: scaleX(1.02) scaleY(1.06); }

        /* CONTENEDOR SLIDER GENERAL OPTIMIZADO */
        .slider-wrapper {
            width: 100%;
            margin: 20px 0;
            padding: 40px 0;
            overflow-x: auto;
            overflow-y: visible;
            display: block; /* Desactiva el colapso de Flexbox anterior */
            scroll-behavior: smooth;
            perspective: 1000px;
            -webkit-overflow-scrolling: touch;
        }
        .slider-wrapper::-webkit-scrollbar { display: none; }
        
        .grid-container { 
            display: flex; 
            flex-direction: row; 
            flex-wrap: nowrap !important; 
            align-items: center;
            gap: 40px; 
            padding: 0 42vw; 
            width: max-content;
            transform-style: preserve-3d;
        }
        
        /* ESTILO BASE DE LAS TARJETAS */
        .card { 
            background: rgba(12, 3, 3, 0.75) !important; 
            border: 2px solid rgba(255, 0, 0, 0.3); 
            border-radius: 20px; 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            height: 420px; 
            width: 310px; 
            justify-content: space-between;
            cursor: pointer;
            flex-shrink: 0; 
            transform-style: preserve-3d;
            
            /* Estado inicial ruleta */
            opacity: 0.25;
            transform: scale(0.82) translateZ(-150px);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease, border-color 0.4s ease, opacity 0.4s ease;
        }
        
        /* TARJETA CENTRAL EN ENFOQUE */
        .card.active-wheel { 
            opacity: 1 !important;
            border-color: #ffb700; /* Marco dorado de Free Fire */
            border-width: 3px;
            box-shadow: 0 0 35px rgba(255, 183, 0, 0.65), inset 0 0 15px rgba(255, 0, 0, 0.25);
            transform: scale(1.06) translateZ(60px) translateY(-10px); /* Flota e incrementa tamaño limpia */
        }
        
        .card.hidden { width: 0 !important; padding: 0 !important; margin: 0 !important; border: none !important; opacity: 0 !important; pointer-events: none !important; overflow: hidden !important; }
        
        .card-title { font-size: 1.45rem; font-weight: bold; margin-bottom: 2px; }
        .card-subtitle { font-size: 0.8rem; color: #ff0000; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; }
        .card-img { width: 100%; max-width: 140px; height: 80px; object-fit: contain; margin: 10px 0; transition: transform 0.3s ease; }
        .card.active-wheel .card-img { transform: scale(1.1) translateZ(20px); }
        
        .btn-group { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .btn-action { display: block; width: 100%; padding: 12px; color: #ffffff; text-decoration: none; font-weight: bold; font-size: 0.9rem; border-radius: 15px; text-transform: uppercase; text-align: center; letter-spacing: 1px; transition: all 0.3s ease; }
        .btn-tutorial { background: #00a2ff; box-shadow: 0 4px 10px rgba(0, 162, 255, 0.3); }
        .btn-download { background: #a200ff; box-shadow: 0 4px 10px rgba(162, 0, 255, 0.3); }
        .btn-action:hover { filter: brightness(1.2); transform: scale(1.03); }

        #notification-container { position: fixed; bottom: 30px; left: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast-notification { background: rgba(0, 0, 0, 0.8); border: 2px solid #ff0000; border-radius: 12px; padding: 16px 28px; color: #ffffff; font-weight: bold; box-shadow: 0 0 25px rgba(255, 0, 0, 0.7); display: flex; align-items: center; opacity: 0; transform: translateY(20px); transition: opacity 0.3s ease, transform 0.3s ease; }
        .toast-notification.show { opacity: 1; transform: translateY(0); }

        /* REPRODUCTOR APPLE STORE */
        .video-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        .video-overlay.active { opacity: 1; pointer-events: auto; }
        .hologram-window { background: #050000; border: 2px solid #ff0000; border-radius: 20px; width: 90%; max-width: 700px; padding: 30px; box-shadow: 0 0 40px #ff0000; transform: scale(0.7) rotateY(15deg); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center; }
        .video-overlay.active .hologram-window { transform: scale(1) rotateY(0deg); }
        .video-placeholder { width: 100%; height: 350px; background: rgba(20,0,0,0.8); border: 1px dashed #ff0000; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin: 20px 0; color: #888; font-weight: bold; }
        .btn-close { background: #ff0000; color: white; border: none; padding: 10px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>

    <div class="progress-bar-scroll" id="scrollBar"></div>

    <div class="video-overlay" id="videoOverlay">
        <div class="hologram-window">
            <h2 id="overlayTitle" style="color: #ff0000; text-transform: uppercase; letter-spacing: 1px;">Tutorial</h2>
            <div class="video-placeholder">📺 REPRODUCTOR DE TUTORIAL DE PAPOXV</div>
            <button class="btn-close" id="closeOverlay">Cerrar</button>
        </div>
    </div>

    <h1 class="section-title" id="mainTitle">Aplicaciones</h1>

    <div class="search-wrapper">
        <div class="tacometro-arc" id="rpmArc"></div>
        <input type="text" class="search-input" placeholder="🔍 Buscar aplicación...">
    </div>

    <!-- RULETA COLOQUIAL -->
    <div class="slider-wrapper" id="sliderWrapper">
        <div class="grid-container" id="wheelGrid">
            
            <div class="card" data-color="radial-gradient(circle, #250040 0%, #050000 100%)">
                <div>

                    <div class="card-subtitle">(Portable PC)</div>
                </div>
