<!DOCTYPE html>
<html lang="es" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>papoxv | Aplicaciones</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* 2. AURORA LÍQUIDA DE SPOTIFY (Fondo dinámico) */
        body { 
            background: radial-gradient(circle, #2a0000 0%, #050000 100%); 
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            min-height: 100vh; 
            padding: 120px 0 40px 0; 
            overflow-x: hidden;
            perspective: 1000px;
            transition: background 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        /* NAVBAR SUPERIOR */
        .navbar { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(5, 0, 0, 0.95); 
            border-bottom: 2px solid rgba(255, 0, 0, 0.3); 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            padding: 18px; 
            z-index: 1000; 
        }
        
        .nav-link { color: #b3b3b3; text-decoration: none; font-size: 1rem; font-weight: bold; text-transform: uppercase; }
        .nav-link.active { color: #ff0000; text-shadow: 0 0 10px #ff0000; }

        /* 3. BARRA DE PROGRESO DE LECTURA (Scroll horizontal) */
        .progress-bar-scroll {
            position: fixed;
            top: 56px; 
            left: 0;
            height: 3px;
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
            width: 0%;
            z-index: 1010;
            transition: width 0.1s ease;
        }

        /* 3. TÍTULO CON CYBER GLITCH */
        .section-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            position: relative;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
        }
        .section-title.glitch {
            animation: glitchEffect 0.2s linear infinite;
        }
        @keyframes glitchEffect {
            0% { text-shadow: 2px -2px #ff0000, -2px 2px #00c6ff; transform: translate(2px, -1px); }
            50% { text-shadow: -2px 2px #ff0000, -2px 2px #00c6ff; transform: translate(-1px, 2px); }
            100% { text-shadow: 2px 2px #ff0000, -2px -2px #00c6ff; transform: translate(0, 0); }
        }

        /* 1. TACÓMETRO DE BÚSQUEDA (Need for Speed Style) */
        .search-wrapper {
            position: relative;
            max-width: 500px;
            margin: 10px auto 40px auto;
            width: 100%;
            padding: 0 20px;
        }
        .search-input { 
            width: 100%; 
            padding: 14px 20px; 
            background: rgba(0, 0, 0, 0.7); 
            border: 2px solid #ff0000; 
            border-radius: 30px; 
            color: #ffffff; 
            font-size: 1rem; 
            outline: none; 
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); 
            transition: all 0.3s ease; 
            text-align: center; 
            z-index: 5;
            position: relative;
        }
        .search-input:focus { box-shadow: 0 0 25px #ff0000; }
        
        .tacometro-arc {
            position: absolute;
            top: -5px; bottom: -5px; left: 15px; right: 15px;
            border: 3px solid transparent;
            border-top: 3px solid rgba(255,0,0,0.1);
            border-radius: 35px;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 1;
        }
        .tacometro-arc.active {
            border-top-color: #ff0000;
            box-shadow: 0 -5px 15px rgba(255,0,0,0.5);
            transform: scaleX(1.02) scaleY(1.06);
        }

        /* 1. CONTENEDOR SLIDER HORIZONTAL STEAM DECK MEJORADO CON SCROLL ACTIVO OBLIGATORIO */
        .slider-wrapper {
            width: 100%;
            overflow-x: scroll; /* Fuerza a que el scroll lateral exista siempre */
            overflow-y: hidden;
            padding: 40px 0;
            display: flex;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        /* Barra de scroll estética y delgada para saber que hay más tarjetas a la derecha */
        .slider-wrapper::-webkit-scrollbar {
            height: 6px;
        }
        .slider-wrapper::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        .slider-wrapper::-webkit-scrollbar-thumb {
            background: rgba(255, 0, 0, 0.3);
            border-radius: 10px;
        }
        .slider-wrapper::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 0, 0, 0.7);
        }
        
        /* Prohibimos que las tarjetas bajen, obligatoriamente se quedan en una sola línea infinita */
        .grid-container { 
            display: flex; 
            flex-wrap: nowrap !important; /* Evita que las tarjetas se organicen hacia abajo */
            gap: 40px; 
            padding: 0 10%; /* Margen izquierdo inicial para que se vea estilo consola */
            width: max-content;
        }
        
        /* TARJETAS TRANSLÚCIDAS */
        .card { 
            background: rgba(15, 5, 5, 0.5); 
            border: 2px solid #ff0000; 
            border-radius: 20px; 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); 
            padding: 30px 25px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            min-height: 420px; 
            width: 340px; /* Ancho fijo bloqueado para forzar el desborde horizontal */
            justify-content: space-between;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease, border-color 0.3s ease, opacity 0.3s ease, width 0.3s ease, margin 0.3s ease;
            cursor: pointer;
            transform-style: preserve-3d;
            flex-shrink: 0; /* Prohíbe que el navegador las encoja para que quepan en la pantalla */
        }
        
        .card:hover, .card.focused { 
            transform: scale(1.05) translateY(-10px);
            border-color: #ff4d4d;
            box-shadow: 0 15px 35px rgba(255, 0, 0, 0.6);
        }
        
        /* Ocultado inteligente para el carrusel horizontal */
        .card.hidden {
            width: 0 !important;
            padding: 0 !important;
            margin: 0 !important;
            border: none !important;
            opacity: 0 !important;
            pointer-events: none !important;
            overflow: hidden !important;
        }
        
        .card-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 2px; transform: translateZ(20px); }
        .card-subtitle { font-size: 0.8rem; color: #ff0000; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; transform: translateZ(15px); }
        .card-img { width: 100%; max-width: 140px; height: 80px; object-fit: contain; margin: 15px 0; transform: translateZ(25px); }
        
        .btn-group { width: 100%; display: flex; flex-direction: column; gap: 12px; transform-style: preserve-3d; transform: translateZ(15px); }
        .btn-action { display: block; width: 100%; padding: 12px; color: #ffffff; text-decoration: none; font-weight: bold; font-size: 0.9rem; border-radius: 15px; text-transform: uppercase; text-align: center; letter-spacing: 1px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease; }
        .btn-tutorial { background: #00a2ff; box-shadow: 0 4px 10px rgba(0, 162, 255, 0.3); }
        .btn-download { background: #a200ff; box-shadow: 0 4px 10px rgba(162, 0, 255, 0.3); }
        .btn-tutorial:hover, .btn-download:hover { transform: translateZ(25px) scale(1.04); filter: brightness(1.1); }

        #notification-container { position: fixed; bottom: 30px; left: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast-notification { background: rgba(0, 0, 0, 0.8); border: 2px solid #ff0000; border-radius: 12px; padding: 16px 28px; color: #ffffff; font-weight: bold; box-shadow: 0 0 25px rgba(255, 0, 0, 0.7); display: flex; align-items: center; opacity: 0; transform: translateY(20px); transition: opacity 0.3s ease, transform 0.3s ease; }
        .toast-notification.show { opacity: 1; transform: translateY(0); }

        /* 3. CAPA EXPANSIBLE HOLOGRAMA (Apple Store Layer) */
        .video-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        .video-overlay.active { opacity: 1; pointer-events: auto; }
        .hologram-window { background: #050000; border: 2px solid #ff0000; border-radius: 20px; width: 90%; max-width: 700px; padding: 30px; box-shadow: 0 0 40px #ff0000; transform: scale(0.7) rotateY(15deg); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center; }
        .video-overlay.active .hologram-window { transform: scale(1) rotateY(0deg); }
        .video-placeholder { width: 100%; height: 350px; background: rgba(20,0,0,0.8); border: 1px dashed #ff0000; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin: 20px 0; color: #888; font-weight: bold; }
        .btn-close { background: #ff0000; color: white; border: none; padding: 10px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
