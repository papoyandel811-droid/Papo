        .navbar { position: fixed; top: 0; left: 0; width: 100%; background: rgba(5, 0, 0, 0.95); border-bottom: 2px solid rgba(255, 0, 0, 0.3); display: flex; justify-content: center; gap: 25px; padding: 18px; z-index: 1000; }
        .nav-link { color: #b3b3b3; text-decoration: none; font-size: 1rem; font-weight: bold; text-transform: uppercase; }

        .search-input { width: 100%; padding: 14px 20px; background: rgba(0, 0, 0, 0.6); border: 2px solid #ff0000; border-radius: 30px; color: #ffffff; font-size: 1rem; outline: none; box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); transition: all 0.3s ease; text-align: center; }
        .search-input::placeholder { color: #888888; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        .search-input:focus { box-shadow: 0 0 25px #ff0000; background: rgba(15, 5, 5, 0.8); }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; justify-items: center; }
        .card { background: rgba(15, 5, 5, 0.7); border: 2px solid #ff0000; border-radius: 16px; box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); padding: 25px; display: flex; flex-direction: column; align-items: center; text-align: center; height: 420px; width: 100%; max-width: 340px; justify-content: space-between; transition: transform 0.1s ease, box-shadow 0.3s ease, border-color 0.3s ease; cursor: pointer; transform-style: preserve-3d; }
        .card-title { font-size: 1.4rem; font-weight: bold; transform: translateZ(25px); }
        .card-subtitle { font-size: 0.85rem; color: #ff4d4d; text-transform: uppercase; margin-bottom: 15px; transform: translateZ(20px); }
        .card-img-box { width: 100%; height: 90px; display: flex; align-items: center; justify-content: center; margin: 15px 0; transform: translateZ(30px); }
        .card-img { width: 100%; max-width: 160px; height: 90px; object-fit: contain; }
        .btn-group { width: 100%; display: flex; flex-direction: column; gap: 12px; transform-style: preserve-3d; transform: translateZ(20px); }
        .btn-action { display: block; width: 100%; padding: 12px; color: #ffffff; text-decoration: none; font-weight: bold; font-size: 0.95rem; border-radius: 30px; text-transform: uppercase; text-align: center; letter-spacing: 1px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease; }
        .btn-tutorial { background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%); }
        .btn-download { background: linear-gradient(90deg, #9d4edd 0%, #7b2cbf 100%); }
        .btn-tutorial:hover { transform: translateZ(35px) scale(1.04); box-shadow: 0 10px 20px rgba(0, 162, 255, 0.6); }
        .btn-download:hover { transform: translateZ(35px) scale(1.04); box-shadow: 0 10px 20px rgba(162, 0, 255, 0.6); }
        .btn-action i { margin-right: 6px; }
        #notification-container { position: fixed; bottom: 30px; left: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast-notification { background: rgba(0, 0, 0, 0.8); border: 2px solid #ff0000; border-radius: 12px; padding: 16px 28px; color: #ffffff; font-weight: bold; font-size: 0.95rem; box-shadow: 0 0 25px rgba(255, 0, 0, 0.7); display: flex; align-items: center; opacity: 0; transform: translateY(20px); transition: opacity 0.3s ease, transform 0.3s ease; }
        .toast-notification.show { opacity: 1; transform: translateY(0); }
    </style>
</head>

    </div>
    <script type="text/javascript">
        window.addEventListener('DOMContentLoaded', () => {
            const input = document.querySelector('.search-input');
            if (input) {
                input.addEventListener('input', function(e) {
                    const texto = e.target.value.toLowerCase().trim();
                    document.querySelectorAll('.grid-container .card').forEach(card => {
                        const titulo = card.querySelector('.card-title').textContent.toLowerCase();
                        card.style.display = titulo.includes(texto) ? 'flex' : 'none';
                    });
                });
            }
            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('mousemove', function(e) {
                    const box = this.getBoundingClientRect();
                    const x = e.clientX - box.left - (box.width / 2);
                    const y = e.clientY - box.top - (box.height / 2);
                    const rotX = -(y / box.height) * 20;
                    const rotY = (x / box.width) * 20;
                    this.style.transform = "rotateX(" + rotX + "deg) rotateY(" + rotY + "deg) scale(1.03)";
                    this.style.boxShadow = "0 15px 35px rgba(255, 0, 0, 0.6)";
                    this.style.borderColor = "#ff4d4d";
                });
                card.addEventListener('mouseleave', function() {
                    this.style.transform = "rotateX(0deg) rotateY(0deg) scale(1)";
                    this.style.boxShadow = "0 0 15px rgba(255, 0, 0, 0.3)";
                    this.style.borderColor = "#ff0000";
                });
            });
            document.querySelectorAll('.btn-notify').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const appName = this.getAttribute('data-name');
                    const container = document.getElementById('notification-container');
                    if (container) {
                        const toast = document.createElement('div');
                        toast.className = 'toast-notification';
                        toast.innerHTML = '🚀 Preparando descarga de ' + appName + '...';
                        container.appendChild(toast);
