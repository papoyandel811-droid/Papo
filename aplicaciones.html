<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>papoxv | Aplicaciones</title>
    <!-- FontAwesome para los íconos de las flechas y botones -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        * { box-sizing: border-box; margin:0; padding:0; }
        body { background: radial-gradient(circle, #2a0000 0%, #050000 100%) !important; color: #ffffff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; overflow-x: hidden; perspective: 1000px; display: flex; flex-direction: column; }
        .navbar { position: fixed; top: 0; left: 0; width: 100%; background: rgba(5, 0, 0, 0.95); border-bottom: 2px solid rgba(255, 0, 0, 0.3); display: flex; justify-content: center; gap: 15px; padding: 15px; z-index: 1000; }
        .nav-link { color: #b3b3b3; text-decoration: none; font-size: 0.9rem; font-weight: bold; text-transform: uppercase; }
        .nav-link.active { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
        
        /* BUSCADOR: Efecto Cristal Translúcido */
        .search-container { max-width: 500px; margin: 100px auto 10px auto; display: flex; justify-content: center; width: 100%; padding: 0 20px; }
        .search-input { width: 100%; padding: 12px 20px; background: rgba(15, 2, 2, 0.7) !important; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 2px solid #ff0000; border-radius: 30px; color: #ffffff; font-size: 1rem; outline: none; box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); transition: all 0.3s ease; text-align: center; }
        .search-input:focus { box-shadow: 0 0 25px #ff0000; background: rgba(25, 4, 4, 0.8) !important; }
        
        /* CONTENEDOR DEL CARRUSEL Y LAS FLECHAS */
        .carousel-container { position: relative; width: 100%; display: flex; align-items: center; justify-content: center; }
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        
        /* Se cambió overflow-x a hidden para un deslizamiento controlado por JS */
        .carousel-wrapper { width: 100%; overflow-x: hidden; scroll-behavior: smooth; display: flex; align-items: center; padding: 60px 0; cursor: grab; }
        .carousel-wrapper:active { cursor: grabbing; }
        .grid-container { display: flex; gap: 40px; padding: 0 calc(50vw - 140px); transition: transform 0.3s ease-out; }
        
        /* TARJETAS: Efecto Cristal Esmerilado Cyberpunk */
        .card { background: linear-gradient(135deg, rgba(25, 5, 5, 0.78) 0%, rgba(10, 2, 2, 0.9) 100%) !important; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 2px solid rgba(255, 0, 0, 0.15); border-radius: 20px; padding: 22px 18px; display: flex; flex-direction: column; align-items: center; text-align: center; height: 400px; width: 280px; min-width: 280px; justify-content: space-between; transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s ease, border-color 0.3s ease, opacity 0.3s ease; transform-style: preserve-3d; opacity: 0.35; transform: scale(0.85); }
        .card.active-card { opacity: 1; border-color: #ff0000; box-shadow: 0 0 35px rgba(255, 0, 0, 0.6); transform: scale(1.12) translateZ(20px); }
        .card-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 2px; }
        .card-subtitle { font-size: 0.75rem; color: #ff0000; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; }
        .img-container { width: 100%; height: 130px; display: flex; align-items: center; justify-content: center; margin: 5px 0; transform-style: preserve-3d; transform: translateZ(35px); }
        .card-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .btn-group { width: 100%; display: flex; flex-direction: column; gap: 10px; opacity: 0.1; transition: opacity 0.2s ease; transform-style: preserve-3d; transform: translateZ(20px); }
        .card.active-card .btn-group { opacity: 1; }
        .btn-action { display: block; width: 100%; padding: 11px; color: #ffffff; text-decoration: none; font-weight: bold; font-size: 0.85rem; border-radius: 15px; text-transform: uppercase; text-align: center; letter-spacing: 1px; }
        .btn-tutorial { background: #00a2ff; }
        .btn-download { background: #a200ff; }
        .btn-action i { margin-right: 5px; }
        
        /* NUEVO: Estilos para las Flechas de Navegación */
        .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(15, 2, 2, 0.8); border: 2px solid rgba(255, 0, 0, 0.5); color: white; width: 50px; height: 50px; border-radius: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; transition: all 0.3s ease; box-shadow: 0 0 15px rgba(255, 0, 0, 0.2); }
        .nav-arrow:hover { background: #ff0000; border-color: #ff0000; box-shadow: 0 0 20px #ff0000; scale: 1.1; }
        .arrow-left { left: 5vw; }
        .arrow-right { right: 5vw; }
        
        /* BOTÓN INFERIOR: Cristal Translúcido */
        .back-home-container { display: flex; justify-content: center; margin: 20px 0; width: 100%; }
        .btn-back-home { display: inline-flex; align-items: center; gap: 8px; padding: 12px 25px; background: rgba(15, 2, 2, 0.7) !important; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: #ffffff; text-decoration: none; font-weight: bold; text-transform: uppercase; border: 2px solid #ff0000; border-radius: 30px; box-shadow: 0 0 15px rgba(255, 0, 0, 0.4); transition: all 0.3s ease; font-size: 0.85rem; }
        .btn-back-home:hover { background: #ff0000 !important; box-shadow: 0 0 25px #ff0000; transform: scale(1.05); }
        
        #notification-container { position: fixed; bottom: 20px; left: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast-notification { background: rgba(0, 0, 0, 0.8); border: 2px solid #ff0000; border-radius: 12px; padding: 14px 24px; color: #ffffff; font-weight: bold; font-size: 0.9rem; box-shadow: 0 0 25px rgba(255, 0, 0, 0.7); display: flex; align-items: center; opacity: 0; transform: translateY(20px); transition: opacity 0.3s ease, transform 0.3s ease; }
        .toast-notification.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <div class="navbar"><a href="index.html" class="nav-link">Inicio</a><a href="juegos.html" class="nav-link">Juegos</a><a href="aplicaciones.html" class="nav-link active">Aplicaciones</a><a href="pc.html" class="nav-link">Windows & Office</a></div>
    <div id="notification-container"></div>
    <div class="search-container"><input type="text" class="search-input" id="buscador-campo" oninput="ejecutarBusqueda()" placeholder="🔍 Buscar aplicación..."></div>
    
    <div class="main-content">
        <!-- Contenedor relativo para posicionar las flechas encima -->
        <div class="carousel-container">
            <!-- Flechas de navegación -->
            <button class="nav-arrow arrow-left" id="btn-prev"><i class="fas fa-chevron-left"></i></button>
            
            <div class="carousel-wrapper" id="carousel">
                <div class="grid-container" id="grid">
                    <!-- Tarjeta 1 -->
                    <div class="card">
                        <div><div class="card-title">CapCut Pro</div><div class="card-subtitle">(Premium Mod)</div></div>
                        <div class="img-container"><img class="card-img" src="https://static.vecteezy.com/system/resources/previews/067/065/640/non_2x/capcut-logo-square-rounded-capcut-logo-capcut-logo-free-download-free-png.png" alt="CapCut"></div>
                        <div class="btn-group"><a href="#" class="btn-action btn-tutorial"><i class="fas fa-play-circle"></i> Ver Tutorial</a><a href="https://cuty.io/UVkpvxOWN4Gr" class="btn-action btn-download btn-notify" data-name="CapCut Pro"><i class="fas fa-download"></i> Descargar</a></div>
                    </div>
                    <!-- Tarjeta 2 -->
                    <div class="card">
                        <div><div class="card-title">OBS_Lite</div><div class="card-subtitle">(PC)</div></div>
                        <div class="img-container"><img class="card-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/OBS_Studio_Logo.svg/1280px-OBS_Studio_Logo.svg.png" alt="obs studio"></div>
                        <div class="btn-group"><a href="#" class="btn-action btn-tutorial"><i class="fas fa-play-circle"></i> Ver Tutorial</a><a href="https://cuty.io/tfvJsHSet" class="btn-action btn-download btn-notify" data-name="OBS_Lite"><i class="fas fa-download"></i> Descargar</a></div>
                    </div>
                    <!-- Tarjeta 3 -->
                    <div class="card">
                        <div><div class="card-title">Loquendo Voice</div><div class="card-subtitle">(PC)</div></div>
                        <div class="img-container"><img class="card-img" src="https://wikimedia.org" alt="Loquendo"></div>
                        <div class="btn-group"><a href="#" class="btn-action btn-tutorial"><i class="fas fa-play-circle"></i> Ver Tutorial</a><a href="https://cuty.io" class="btn-action btn-download btn-notify" data-name="Loquendo Voice"><i class="fas fa-download"></i> Descargar</a></div>
                    </div>
                    <!-- Tarjeta 4 (Corregida y cerrada) -->
                                    <div class="card">
                    <div><div class="card-title">Spotify Plus</div><div class="card-subtitle">(PC)</div></div>
                    <div class="img-container"><img class="card-img" src="https://flaticon.com" alt="Spotify"></div>
                    <div class="btn-group"><a href="#" class="btn-action btn-tutorial"><i class="fas fa-play-circle"></i> Ver Tutorial</a><a href="#" class="btn-action btn-download btn-notify" data-name="Spotify Plus"><i class="fas fa-download"></i> Descargar</a></div>
                </div>
            </div>
            
            <!-- NUEVO: Botón Flecha Derecha -->
            <button class="nav-arrow arrow-right" id="btn-next" style="position: fixed; right: 40px; top: 55%; transform: translateY(-50%); background: rgba(15, 2, 2, 0.8); border: 2px solid #ff0000; color: #fff; width: 50px; height: 50px; border-radius: 50%; z-index: 2000; cursor: pointer; box-shadow: 0 0 15px rgba(255, 0, 0, 0.5); transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>
    
    <div class="back-home-container"><a href="index.html" class="btn-back-home"><i class="fas fa-home"></i> Volver al Inicio</a></div>
    
    <!-- NUEVO: Estilos rápidos para las flechas flotantes (Efecto Cyberpunk) -->
    <style>
        .nav-arrow:hover { background: #ff0000 !important; box-shadow: 0 0 25px #ff0000 !important; transform: translateY(-50%) scale(1.1); }
        .nav-arrow:active { transform: translateY(-50%) scale(0.95); }
    </style>

    <script>
        const carousel = document.getElementById('carousel'); const cards = document.querySelectorAll('.card');
        
        // NUEVO: Selectores para los botones de navegación
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        function updateCarouselFocus() {
            const screenCenter = window.innerWidth / 2; let closestCard = null; let minDistance = Infinity;
            cards.forEach(card => {
                // Si la tarjeta está oculta por el buscador, no la tomamos en cuenta
                if(card.style.display === "none") return;
                
                const cardRect = card.getBoundingClientRect(); const cardCenter = cardRect.left + cardRect.width / 2; const distance = Math.abs(screenCenter - cardCenter);
                card.classList.remove('active-card'); card.style.transform = 'scale(0.85) rotateX(0deg) rotateY(0deg) translateZ(0)';
                if (distance < minDistance) { minDistance = distance; closestCard = card; }
            });
            if (closestCard) { closestCard.classList.add('active-card'); closestCard.style.transform = 'scale(1.12) rotateX(0deg) rotateY(0deg) translateZ(20px)'; }
        }
        carousel.addEventListener('scroll', updateCarouselFocus); window.addEventListener('resize', updateCarouselFocus); setTimeout(updateCarouselFocus, 100);
        let isDown = false; let startX; let scrollLeft;
        carousel.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - carousel.offsetLeft; scrollLeft = carousel.scrollLeft; });
        carousel.addEventListener('mouseleave', () => isDown = false); carousel.addEventListener('mouseup', () => isDown = false);
        carousel.addEventListener('mousemove', (e) => { if(!isDown) return; e.preventDefault(); const x = e.pageX - carousel.offsetLeft; const walk = (x - startX) * 1.5; carousel.scrollLeft = scrollLeft - walk; updateCarouselFocus(); });
        
        // NUEVO: Lógica para pasar a la siguiente tarjeta presionando el botón
        btnNext.addEventListener('click', () => {
            // Buscamos cuál es la tarjeta activa actualmente
            const activeCard = carousel.querySelector('.card.active-card');
            if (activeCard) {
                const nextCard = activeCard.nextElementSibling;
                // Verificamos que exista una siguiente tarjeta y que esté visible en el buscador
                if (nextCard && nextCard.classList.contains('card') && nextCard.style.display !== "none") {
                    const cardWidth = activeCard.offsetWidth + 40; // Ancho de tarjeta + Gap (40px)
                    carousel.scrollBy({ left: cardWidth, behavior: 'smooth' });
                }
            }
        });

        // NUEVO: Lógica para regresar a la tarjeta anterior presionando el botón
        btnPrev.addEventListener('click', () => {
            const activeCard = carousel.querySelector('.card.active-card');
            if (activeCard) {
                const prevCard = activeCard.previousElementSibling;
                if (prevCard && prevCard.classList.contains('card') && prevCard.style.display !== "none") {
                    const cardWidth = activeCard.offsetWidth + 40; 
                    carousel.scrollBy({ left: -cardWidth, behavior: 'smooth' });
                }
            }
        });

        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                if (!card.classList.contains('active-card')) return;
                const rect = card.getBoundingClientRect(); const x = e.clientX - rect.left - (rect.width / 2); const y = e.clientY - rect.top - (rect.height / 2);
                card.style.transform = `scale(1.12) rotateX(${(-y / (rect.height / 2)) * 12}deg) rotateY(${(x / (rect.width / 2)) * 12}deg) translateZ(20px)`;
            });
            card.addEventListener('mouseleave', () => { if (card.classList.contains('active-card')) { card.style.transform = 'scale(1.12) rotateX(0deg) rotateY(0deg) translateZ(20px)'; } });
        });

        document.querySelectorAll('.btn-action').forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                if (btn.closest('.card').classList.contains('active-card')) {
                    btn.style.transition = "all 0.3s ease"; btn.style.transform = "translateZ(50px) scale(1.05)";
                    btn.style.boxShadow = btn.classList.contains('btn-tutorial') ? "0 10px 25px rgba(0, 162, 255, 0.8)" : "0 10px 25px rgba(162, 0, 255, 0.8)";
                }
            });
            btn.addEventListener('mouseleave', () => { btn.style.transform = "translateZ(20px) scale(1)"; btn.style.boxShadow = "none"; });
        });

        function ejecutarBusqueda() {
            let input = document.getElementById('buscador-campo').value.toLowerCase().trim();
            cards.forEach(card => { let titleElement = card.querySelector('.card-title'); if (titleElement) { card.style.display = titleElement.textContent.toLowerCase().includes(input) ? "flex" : "none"; } });
            updateCarouselFocus();
        }
        document.querySelectorAll('.btn-notify').forEach(button => {
            button.addEventListener('click', function(e) {
                let appName = this.getAttribute('data-name'); let container = document.getElementById('notification-container');
                let toast = document.createElement('div'); toast.className = 'toast-notification'; toast.innerHTML = `⏳ Preparando descarga de ${appName}...`;
                container.appendChild(toast); setTimeout(() => toast.classList.add('show'), 50);
                setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
            });
        });
    </script>
</body>
</html>
