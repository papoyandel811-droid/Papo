        * { box-sizing: border-box; margin: 0; padding: 0; }

            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            min-height: 100vh; 
            padding: 140px 20px 40px 20px; 
            overflow-x: hidden;
            perspective: 1000px;
        }
        
        /* NAVBAR FIJA */
        .navbar { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(5, 0, 0, 0.95); 
            border-bottom: 2px solid rgba(255, 0, 0, 0.3);

        }

        /* TÍTULO PRINCIPAL */
        .main-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            text-transform: uppercase;
        }

        /* BUSCADOR */
        .search-container { 
            max-width: 500px; 
            margin: 0 auto 40px auto; 
            display: flex; 
            justify-content: center; 
            width: 100%; 
        }
        
        .search-input { 
            width: 100%; 
            padding: 14px 20px; 
            background: rgba(0, 0, 0, 0.6); 
            border: 2px solid #ff0000; 
            border-radius: 30px; 
            color: #ffffff; 
            font-size: 1rem; 
            outline: none; 
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); 
            transition: all 0.3s ease; 
            text-align: center; 
        }
        
        .search-input::placeholder { 
            color: #888888; 
            text-transform: uppercase;
        }
        
        .search-input:focus { 
            box-shadow: 0 0 25px #ff0000; 
        }
        
        /* CUADRÍCULA CON GRID EN FILA SIMÉTRICA */
        .grid-container { 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 35px; 
            max-width: 1200px; 
            margin: 0 auto; 
            justify-items: center;
        }
        
        /* TARJETA ROJO NEÓN */
        .card { 
            background: rgba(15, 5, 5, 0.7); 
            border: 2px solid #ff0000; 
            border-radius: 24px; 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            height: 480px; 
            width: 100%; 
            max-width: 320px; 
            justify-content: space-between; 
            transition: transform 0.1s ease, box-shadow 0.3s ease, border-color 0.3s ease; 
            cursor: pointer; 
            transform-style: preserve-3d; 
        }
        
        .card:hover {
            border-color: #ff4d4d;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
        }
        
        /* CAJA PARA LA IMAGEN VERTICAL */
        .card-img-box {
            width: 140px;
            height: 190px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            transform: translateZ(25px);
            background: #0d0d0d;
        }

        .card-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        .card-title { 
            font-size: 1.4rem; 
            font-weight: bold; 
            color: #ffffff;
            margin-bottom: 4px;
            transform: translateZ(20px); 
        }
        
        .card-subtitle { 
            font-size: 0.85rem; 
            color: #ff4d4d; 
            text-transform: uppercase; 
            margin-bottom: 15px;
            transform: translateZ(15px); 
        }
        
        /* BOTONES DEGRADADOS ROJO-MORADO */
        .btn-group { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            transform: translateZ(15px); 
        }
        
        .btn-action { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%; 
            padding: 11px; 
            color: #ffffff; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 0.95rem; 
            border-radius: 25px; 
            transition: transform 0.2s ease, box-shadow 0.3s ease; 
            background: linear-gradient(90deg, #ff0000 0%, #7b2cbf 100%);
            box-shadow: 0 4px 12px rgba(123, 44, 191, 0.3);
        }
        
        .btn-action:hover { 
            transform: scale(1.03); 
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.5); 
        }
    </style>
</head>
